services:
  cv-similarity-api:
    build: .
    container_name: cv_similarity_api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      SERVING_BACKEND: local
      ROLLOUT_MODE: production
      REGISTRY_PATH: registry/registry.json
      LOG_LEVEL: INFO
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
